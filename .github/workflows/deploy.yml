name: Deploy to AWS

on:
  push:
    branches:
      - main

env:
  AWS_REGION: ap-northeast-2
  ECR_REGISTRY: 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 인프라 레포 체크아웃
        uses: actions/checkout@v4

      - name: AWS 자격증명 설정
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        uses: aws-actions/amazon-ecr-login@v2

      - name: Secrets Manager에서 프론트엔드 환경변수 가져오기
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id erp/prod \
            --region ap-northeast-2 \
            --query SecretString \
            --output text)

          echo "NEXT_PUBLIC_APP_URL=$(echo $SECRET | python3 -c "import sys,json; print(json.load(sys.stdin).get('NEXT_PUBLIC_APP_URL',''))")" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_KAKAO_CLIENT_ID=$(echo $SECRET | python3 -c "import sys,json; print(json.load(sys.stdin).get('NEXT_PUBLIC_KAKAO_CLIENT_ID',''))")" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=$(echo $SECRET | python3 -c "import sys,json; print(json.load(sys.stdin).get('NEXT_PUBLIC_NAVER_MAP_CLIENT_ID',''))")" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PORTONE_STORE_ID=$(echo $SECRET | python3 -c "import sys,json; print(json.load(sys.stdin).get('NEXT_PUBLIC_PORTONE_STORE_ID',''))")" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_PORTONE_CHANNEL_KEY=$(echo $SECRET | python3 -c "import sys,json; print(json.load(sys.stdin).get('NEXT_PUBLIC_PORTONE_CHANNEL_KEY',''))")" >> $GITHUB_ENV

      # 백엔드
      - name: 백엔드 레포 체크아웃
        uses: actions/checkout@v4
        with:
          repository: heakbomb/Erp-Back
          path: backend

      - name: 백엔드 빌드 & 푸시
        run: |
          docker build -t $ECR_REGISTRY/erp-backend:latest ./backend
          docker push $ECR_REGISTRY/erp-backend:latest

      # 프론트엔드
      - name: 프론트엔드 레포 체크아웃
        uses: actions/checkout@v4
        with:
          repository: heakbomb/Erp-Front
          path: frontend

      - name: 프론트엔드 빌드 & 푸시
        run: |
          docker build \
            --build-arg NEXT_PUBLIC_API_URL=/api \
            --build-arg NEXT_PUBLIC_APP_URL=${{ env.NEXT_PUBLIC_APP_URL }} \
            --build-arg NEXT_PUBLIC_KAKAO_CLIENT_ID=${{ env.NEXT_PUBLIC_KAKAO_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${{ env.NEXT_PUBLIC_NAVER_MAP_CLIENT_ID }} \
            --build-arg NEXT_PUBLIC_PORTONE_STORE_ID=${{ env.NEXT_PUBLIC_PORTONE_STORE_ID }} \
            --build-arg NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${{ env.NEXT_PUBLIC_PORTONE_CHANNEL_KEY }} \
            -t $ECR_REGISTRY/erp-frontend:latest ./frontend
          docker push $ECR_REGISTRY/erp-frontend:latest

      # AI 서버
      - name: AI 레포 체크아웃
        uses: actions/checkout@v4
        with:
          repository: heakbomb/Erp-AI
          path: ai

      - name: AI 빌드 & 푸시
        run: |
          docker build -t $ECR_REGISTRY/erp-ai:latest ./ai
          docker push $ECR_REGISTRY/erp-ai:latest

      # Weather Batch
      - name: Weather Batch 레포 체크아웃
        uses: actions/checkout@v4
        with:
          repository: heakbomb/Erp-Weather-Batch
          path: batch

      - name: Weather Batch 빌드 & 푸시
        run: |
          docker build -t $ECR_REGISTRY/erp-batch:latest ./batch
          docker push $ECR_REGISTRY/erp-batch:latest

      # EC2 배포
      - name: EC2 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ec2-user
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/Erp-Infra
            git pull origin main
            aws ecr get-login-password --region ap-northeast-2 | docker login --username AWS --password-stdin 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com
            docker-compose pull
            docker-compose up -d
            docker image prune -f
