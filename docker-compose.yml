services:
  # 2. 메인 백엔드 (Spring Boot ERP)
  erp-backend:
    image: 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com/erp-backend:latest
    container_name: erp-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      APP_JWT_SECRET: ${APP_JWT_SECRET}
      APP_JWT_ACCESS_TOKEN_TTL_MINUTES: ${APP_JWT_ACCESS_TOKEN_TTL_MINUTES}
      APP_JWT_REFRESH_TOKEN_TTL_DAYS: ${APP_JWT_REFRESH_TOKEN_TTL_DAYS}
      APP_VERIFICATION_CODE_SECRET: ${APP_VERIFICATION_CODE_SECRET}
      NTS_BASE_URL: ${NTS_BASE_URL}
      NTS_SERVICE_KEY: ${NTS_SERVICE_KEY}
      IAMPORT_API_KEY: ${IAMPORT_API_KEY}
      IAMPORT_API_SECRET: ${IAMPORT_API_SECRET}
      APP_IMAP_HOST: ${APP_IMAP_HOST}
      APP_IMAP_PORT: ${APP_IMAP_PORT}
      APP_IMAP_USERNAME: ${APP_IMAP_USERNAME}
      APP_IMAP_PASSWORD: ${APP_IMAP_PASSWORD}
      SPRING_MAIL_HOST: ${SPRING_MAIL_HOST}
      SPRING_MAIL_PORT: ${SPRING_MAIL_PORT}
      SPRING_MAIL_USERNAME: ${SPRING_MAIL_USERNAME}
      SPRING_MAIL_PASSWORD: ${SPRING_MAIL_PASSWORD}
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_AUTH: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_ENABLE: "true"
      SPRING_MAIL_PROPERTIES_MAIL_SMTP_STARTTLS_REQUIRED: "true"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_AUTHENTICATION_METHOD: "client_secret_post"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_AUTHORIZATION_GRANT_TYPE: "authorization_code"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_REDIRECT_URI: "{baseUrl}/login/oauth2/code/{registrationId}"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_SCOPE: "profile_nickname"
      SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_KAKAO_CLIENT_NAME: "Kakao"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_AUTHORIZATION_URI: "https://kauth.kakao.com/oauth/authorize"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_TOKEN_URI: "https://kauth.kakao.com/oauth/token"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_INFO_URI: "https://kapi.kakao.com/v2/user/me"
      SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_KAKAO_USER_NAME_ATTRIBUTE: "id"
      APP_FRONTEND_BASE_URL: ${APP_FRONTEND_BASE_URL}
      FILE_UPLOAD_DIR: ${FILE_UPLOAD_DIR}
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.MySQL8Dialect
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO}

  # 3. 데이터 수집 서버 (Weather Batch)
  weather-batch:
    image: 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com/erp-batch:latest
    container_name: weather-batch
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      KMA_AUTH_KEY: ${KMA_AUTH_KEY}
      KMA_BASE_URL: ${KMA_BASE_URL}
      KMA_STN: ${KMA_STN}
      KMA_HELP: ${KMA_HELP}
      BACKFILL_ENABLED: ${BACKFILL_ENABLED}
      BACKFILL_FROM: ${BACKFILL_FROM}
      BACKFILL_TO: ${BACKFILL_TO}
      BACKFILL_STEP_MINUTES: ${BACKFILL_STEP_MINUTES}
      BACKFILL_SLEEP_MS: ${BACKFILL_SLEEP_MS}
      WEATHER_CRON: ${WEATHER_CRON}
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQL8Dialect

  # 4. AI 서버
  ai:
    image: 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com/erp-ai:latest
    container_name: erp-ai
    ports:
      - "8000:8000"

  # 5. 프론트엔드 (React/Next.js)
  frontend:
    image: 262517453150.dkr.ecr.ap-northeast-2.amazonaws.com/erp-frontend:latest
    container_name: erp-frontend
    ports:
      - "80:80"
    depends_on:
      - erp-backend
    environment:
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - NEXT_PUBLIC_KAKAO_CLIENT_ID=${NEXT_PUBLIC_KAKAO_CLIENT_ID}
      - NEXT_PUBLIC_NAVER_MAP_CLIENT_ID=${NEXT_PUBLIC_NAVER_MAP_CLIENT_ID}
      - NEXT_PUBLIC_PORTONE_STORE_ID=${NEXT_PUBLIC_PORTONE_STORE_ID}
      - NEXT_PUBLIC_PORTONE_CHANNEL_KEY=${NEXT_PUBLIC_PORTONE_CHANNEL_KEY}

